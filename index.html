<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sionnach — Irish Tune Identifier</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1a0f;
    color: #d4ddd0;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
}

.page { max-width: 1200px; margin: 0 auto; padding: 16px; }

header { text-align: center; margin-bottom: 16px; }
header h1 { font-size: 22px; font-weight: 700; color: #a8cc8c; }
header p {
    color: #7a9470; font-size: 13px; margin-top: 2px;
    transition: opacity 0.8s ease;
}
header p.fading { opacity: 0; }

button {
    padding: 8px 18px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
}
button:hover:not(:disabled) { opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: default; }

/* ---- Audio card header ---- */
.viz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
}
.viz-header h3 { font-size: 11px; color: #7a9470; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
.viz-header-right {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; color: #4a6340;
}
#audioDevice {
    max-width: 160px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
}
#timer {
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 11px; color: #4a6340; flex-shrink: 0;
}
.recording #timer { color: #c45c3e; }
.mic-btn {
    padding: 5px 14px; border: none;
    border-radius: 8px; font-size: 12px; font-weight: 600; color: #d4ddd0;
    cursor: pointer; transition: background 0.15s;
}
.mic-btn.recording { background: #8c3030; }
.mic-btn.recording:hover { background: #a03838; }
.mic-btn.idle { background: #3d7a2a; }
.mic-btn.idle:hover { background: #4c8c30; }

/* ---- Level meter ---- */
.level-meter {
    height: 3px; background: #0d1a0f; border-radius: 3px;
    margin-top: 8px; overflow: hidden;
}
.level-meter-fill {
    height: 100%; width: 0%; border-radius: 3px;
    background: #4a6340; transition: width 0.1s linear;
}

/* ---- Two-column layout ---- */
.layout { display: flex; gap: 16px; align-items: flex-start; }
.main-col { flex: 1; min-width: 0; }
.side-col {
    width: 300px; flex-shrink: 0;
    position: sticky; top: 16px;
    max-height: calc(100vh - 32px);
    display: flex; flex-direction: column;
}

/* ---- Hero card (current tune + metrics) ---- */
.hero {
    background: #1a2418; border-radius: 12px; padding: 16px 18px;
    margin-bottom: 12px; border: 1px solid #2a3528;
}
.hero-top { display: flex; align-items: center; gap: 14px; }
.hero-info { flex: 1; min-width: 0; }
.hero-label { font-size: 10px; color: #7a9470; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
.hero-name {
    font-size: 22px; font-weight: 700; margin: 2px 0; color: #c8e0b0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hero-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.hero-type { font-size: 13px; color: #c4973a; font-weight: 600; text-transform: capitalize; }
.hero-conf { font-size: 13px; color: #6aaa3d; }
.hero-link {
    display: inline-block; padding: 7px 16px;
    background: #3d7a2a; color: #d4ddd0; border-radius: 8px;
    text-decoration: none; font-size: 13px; font-weight: 600;
    white-space: nowrap; transition: opacity 0.15s; flex-shrink: 0;
}
.hero-link:hover { opacity: 0.85; }
.hero-stats {
    display: flex; align-items: center; gap: 16px; margin-top: 10px;
    padding-top: 10px; border-top: 1px solid #2a3528;
}
.hero-stats .mic-btn { margin-left: auto; }
.hero-stat { display: flex; align-items: baseline; gap: 5px; }
.hero-stat-label { font-size: 10px; color: #7a9470; text-transform: uppercase; letter-spacing: 0.5px; }
.hero-stat-value { font-size: 18px; font-weight: 700; color: #c8e0b0; }
.hero-stat-unit { font-size: 12px; color: #7a9470; font-weight: 400; }

/* ---- Sheet music panel ---- */
.sheet-panel {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.4s ease, opacity 0.3s ease, margin 0.4s ease;
    opacity: 0; margin-bottom: 0;
}
.sheet-panel.open {
    grid-template-rows: 1fr;
    opacity: 1; margin-bottom: 12px;
}
.sheet-panel-inner {
    overflow: hidden;
    background: #1a2418; border-radius: 12px; padding: 0 16px;
    transition: padding 0.4s ease; border: 1px solid #2a3528;
}
.sheet-panel.open .sheet-panel-inner { padding: 14px 16px; }
.sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
}
.sheet-header h3 {
    font-size: 11px; color: #7a9470; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1px;
}
.sheet-nav { display: flex; align-items: center; gap: 6px; }
.sheet-nav-bottom { display: none; }
.sheet-nav-btn {
    width: 28px; height: 28px; padding: 0;
    background: #2a3528; color: #d4ddd0; border-radius: 6px;
    font-size: 18px; line-height: 1; display: flex;
    align-items: center; justify-content: center;
}
.sheet-setting-label { font-size: 11px; color: #7a9470; min-width: 80px; text-align: center; }
.sheet-lock-icon {
    font-size: 11px; flex-shrink: 0;
    color: #7a9470; transition: all 0.15s;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    background: none; border: none; padding: 2px 6px; border-radius: 4px;
    cursor: default;
}
.sheet-lock-icon.locked {
    color: #e8944a; font-weight: 600;
    background: rgba(232,148,74,0.12); cursor: pointer;
    border: 1px solid rgba(232,148,74,0.3); border-radius: 6px;
    padding: 3px 8px;
}
.sheet-render.locked {
    border-color: #e8944a;
    animation: sheetBuzz 0.3s ease;
}
@keyframes sheetBuzz {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-3px); }
    40% { transform: translateX(3px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
}
.sheet-stage {
    display: grid;
}
.sheet-stage > * {
    grid-area: 1 / 1;
}
.sheet-render-next {
    z-index: 3; opacity: 0; pointer-events: none;
    transform: scale(0.95);
    transform-origin: center center;
    background: #142018; border-radius: 8px; padding: 16px 20px;
    overflow: hidden;
    cursor: default;
}
.sheet-render-next.entering {
    transition: opacity 0.35s ease, transform 0.35s ease;
    opacity: 1; transform: scale(1);
}
.sheet-render.exiting svg {
    transition: opacity 0.35s ease;
    opacity: 0;
}
.sheet-render-next svg { display: block; max-width: 100%; pointer-events: none; }
.sheet-context {
    display: flex; align-items: center; gap: 10px;
    flex: 1; justify-content: center; min-width: 0;
    opacity: 0; transition: opacity 0.5s ease;
}
.sheet-context.visible { opacity: 1; }
.sheet-context-name {
    font-size: 12px; color: #c8e0b0; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sheet-context-meta {
    display: flex; gap: 8px; font-size: 11px; color: #7a9470;
    white-space: nowrap; flex-shrink: 0;
}
.sheet-context-meta .ctx-type { color: #c4973a; font-weight: 500; }
.ctx-conf { color: #6aaa3d; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
@media (max-width: 600px) {
    .sheet-context-meta { display: none; }
}
.sheet-render {
    background: #142018; border-radius: 8px; padding: 16px 20px;
    overflow-x: auto; border: 1px solid #243828;
    cursor: pointer; transition: border-color 0.5s ease;
    position: relative; z-index: 2;
}
.sheet-render svg { display: block; max-width: 100%; pointer-events: none; }

/* ---- Tune search ---- */
.search-card {
    margin-bottom: 12px; position: relative;
}
.search-input-wrap {
    position: relative; display: flex; align-items: center;
}
.search-input {
    width: 100%; padding: 10px 14px; padding-right: 32px;
    background: #1a2418; border: 1px solid #2a3528; border-radius: 10px;
    color: #d4ddd0; font-size: 14px; outline: none;
    transition: border-color 0.15s;
}
.search-input::placeholder { color: #4a6340; }
.search-input:focus { border-color: #4c8c30; }
.search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    color: #7a9470; font-size: 18px; cursor: pointer; line-height: 1;
}
.search-clear:hover { color: #d4ddd0; }
.search-results {
    position: absolute; left: 0; right: 0; top: 100%; z-index: 100;
    background: #1a2418; border: 1px solid #2a3528; border-top: none;
    border-radius: 0 0 10px 10px; max-height: 240px; overflow-y: auto;
}
.search-results::-webkit-scrollbar { width: 4px; }
.search-results::-webkit-scrollbar-track { background: transparent; }
.search-results::-webkit-scrollbar-thumb { background: #3a4a35; border-radius: 2px; }
.search-result-row {
    padding: 8px 14px; cursor: pointer; transition: background 0.1s;
    border-bottom: 1px solid #222e20;
}
.search-result-row:last-child { border-bottom: none; }
.search-result-row:hover { background: #223020; }
.search-result-name {
    font-size: 13px; font-weight: 500; color: #c8e0b0;
}
.search-result-type {
    font-size: 11px; color: #c4973a; font-weight: 500; margin-left: 6px;
}

/* ---- Chromagram ---- */
.viz-card {
    background: #1a2418; border-radius: 12px; padding: 12px;
    margin-bottom: 12px; position: relative; border: 1px solid #2a3528;
}
.chroma-wrap { position: relative; }
canvas { display: block; border-radius: 6px; }
#chromaCanvas { height: 96px; width: 100%; }

/* ---- Listening progress ring (inside hero card) ---- */
.listen-ring {
    flex-shrink: 0;
}
.listen-ring-svg {
    width: 44px; height: 44px; transform: rotate(-90deg);
}
.listen-ring-bg {
    fill: rgba(13, 26, 15, 0.6); stroke: rgba(42, 53, 40, 0.6); stroke-width: 5;
}
.listen-ring-fill {
    fill: none; stroke: #4c8c30; stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 213.6;
    stroke-dashoffset: 213.6;
    transition: stroke 0.3s ease;
}
.listen-ring-fill.draining { stroke: #c4973a; }
.listen-ring-fill.ready { stroke: #6aaa3d; }
.sheet-ring { width: 16px; height: 16px; flex-shrink: 0; vertical-align: middle; margin-right: 2px; }

/* ---- Session history (main column) ---- */
.history-card {
    background: #1a2418; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 12px; border: 1px solid #2a3528;
}
.history-card h3 {
    font-size: 11px; color: #7a9470; margin-bottom: 10px;
    font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
}
.history-list { max-height: 300px; overflow-y: auto; }
.history-list::-webkit-scrollbar { width: 4px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: #3a4a35; border-radius: 2px; }

.history-entry {
    display: flex; align-items: baseline; gap: 10px;
    padding: 6px 8px; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
}
.history-entry:first-child { animation: fadeIn 0.3s ease; }
.history-entry:hover { background: #223020; }
.history-entry.current { background: #223020; }
.history-entry.active-sheet { border-left: 3px solid #6aaa3d; padding-left: 5px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

.history-time {
    font-size: 10px; color: #4a6340; flex-shrink: 0;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
}
.history-body { flex: 1; min-width: 0; }
.history-name {
    font-size: 13px; font-weight: 600; color: #c8e0b0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.history-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: #7a9470; margin-top: 1px;
}
.history-type { color: #c4973a; font-weight: 500; text-transform: capitalize; }
.history-conf { color: #6aaa3d; }
.history-empty { color: #4a6340; font-size: 12px; text-align: center; padding: 16px 0; }

/* ---- Predictions sidebar ---- */
.preds-card {
    background: #1a2418; border-radius: 12px; padding: 14px 16px;
    flex: 1; overflow: hidden; display: flex; flex-direction: column;
    border: 1px solid #2a3528;
}
.preds-card h3 {
    font-size: 11px; color: #7a9470; margin-bottom: 10px;
    font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
    flex-shrink: 0;
}
.preds-list { flex: 1; overflow-y: auto; min-height: 0; }
.preds-list::-webkit-scrollbar { width: 4px; }
.preds-list::-webkit-scrollbar-track { background: transparent; }
.preds-list::-webkit-scrollbar-thumb { background: #3a4a35; border-radius: 2px; }

.pred-row {
    position: relative; display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 4px; cursor: pointer; overflow: hidden;
    transition: background 0.15s, border-color 0.3s, opacity 0.3s;
    border-left: 3px solid transparent;
}
.pred-row:hover { background: rgba(106,170,61,0.08); }
.pred-row.pred-top { border-left-color: #6aaa3d; }
.pred-row.pred-top .pred-name { color: #6aaa3d; }
.pred-row.pred-enter { animation: predSlideIn 0.35s ease both; }
.pred-row.pred-exit { animation: predFadeOut 0.25s ease both; pointer-events: none; }
@keyframes predSlideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: none; }
}
@keyframes predFadeOut {
    from { opacity: 1; }
    to { opacity: 0; transform: translateX(8px); }
}
.pred-bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: rgba(106,170,61,0.10); border-radius: 4px;
    transition: width 0.6s ease; pointer-events: none;
}
.pred-info { flex: 1; min-width: 0; position: relative; }
.pred-name {
    font-size: 13px; font-weight: 500; display: block;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pred-meta {
    font-size: 11px; color: #7a9470; display: block;
}
.pred-pct { font-size: 13px; font-weight: 600; color: #7a9470; min-width: 40px; text-align: right; position: relative; transition: color 0.3s; }
.pred-row.pred-top .pred-pct { color: #6aaa3d; }
.empty-state { text-align: center; color: #4a6340; padding: 20px 0; font-size: 12px; }

/* ---- Splash screen ---- */
#splash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #0d1a0f; z-index: 1000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.6s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }
#splash .splash-title {
    font-size: 42px; font-weight: 700; color: #a8cc8c;
    transition: transform 0.8s ease, font-size 0.8s ease;
}
#splash .splash-fox {
    font-size: 48px; margin: 20px 0;
    display: inline-block;
    user-select: none; -webkit-user-select: none;
}
#splash .splash-fox.spin-out {
    animation: spinShrink 0.6s ease forwards;
}
#splash .splash-fox.spin-in {
    animation: spinGrow 0.6s ease forwards;
}
@keyframes spinShrink {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.2) rotate(180deg); }
    100% { transform: scale(0) rotate(360deg); }
}
@keyframes spinGrow {
    0% { transform: scale(0) rotate(-360deg); }
    50% { transform: scale(1.2) rotate(-180deg); }
    80% { transform: scale(1.05) rotate(-20deg); }
    100% { transform: scale(1) rotate(0deg); }
}
.splash-device {
    margin: 16px 0 8px;
}
.splash-device select {
    background: #1a2418; color: #d4ddd0;
    border: 1px solid #2a3528; border-radius: 8px;
    padding: 8px 12px; font-size: 14px;
    min-width: 220px; outline: none;
    font-family: inherit;
}
.splash-device select:focus { border-color: #4c8c30; }

#splash .splash-btn {
    display: inline-block; padding: 12px 36px;
    background: #3d7a2a; color: #d4ddd0; border-radius: 10px;
    text-decoration: none; cursor: pointer; font-weight: 700;
    font-size: 18px; border: none; transition: background 0.15s;
    margin-top: 8px;
}
#splash .splash-btn:hover { background: #4c8c30; }

/* ---- Loading ---- */
#loading { text-align: center; padding: 48px 0; }
#loading p { margin-bottom: 12px; color: #7a9470; }
#loadProgress {
    width: 200px; height: 6px; appearance: none;
    border: none; border-radius: 3px; overflow: hidden;
}
#loadProgress::-webkit-progress-bar { background: #2a3528; border-radius: 3px; }
#loadProgress::-webkit-progress-value { background: #4c8c30; border-radius: 3px; }

/* ---- Quick match pills (simple mode) ---- */
.quick-matches {
    display: flex; gap: 8px; margin-bottom: 12px;
    flex-wrap: wrap;
}
body.advanced .quick-matches { display: none !important; }
.quick-pill {
    position: relative; overflow: hidden;
    background: #1a2418; border: 1px solid #2a3528; border-radius: 20px;
    padding: 6px 14px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: #c8e0b0;
    flex: 1 1 0; min-width: 80px; max-width: 50%;
    text-align: center; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    transition: border-color 0.3s;
}
.quick-pill:hover { border-color: #4c8c30; }
.quick-pill.pill-top { border-color: #6aaa3d; color: #6aaa3d; }
.quick-pill.pill-top.pill-draining { border-color: #c4973a; color: #c4973a; }
.quick-pill.pill-top.pill-ready { border-color: #6aaa3d; color: #6aaa3d; }
.quick-pill-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: rgba(106, 170, 61, 0.12);
    border-radius: 20px;
    transition: width 0.15s ease, background 0.3s ease;
    pointer-events: none;
}
.quick-pill.pill-draining .quick-pill-fill { background: rgba(196, 151, 58, 0.15); }
.quick-pill.pill-ready .quick-pill-fill { background: rgba(106, 170, 61, 0.18); }
.quick-pill-name {
    position: relative; pointer-events: none;
}

.hidden { display: none !important; }

/* ---- Advanced mode toggle ---- */
header { position: relative; }
.advanced-toggle {
    position: absolute; right: 0; top: 2px;
    background: none; border: 1px solid #2a3528; border-radius: 6px;
    color: #4a6340; font-size: 11px; font-weight: 500;
    padding: 3px 10px; cursor: pointer;
    transition: all 0.2s;
}
.advanced-toggle:hover { border-color: #4c8c30; color: #7a9470; }
body.advanced .advanced-toggle {
    background: rgba(76, 140, 48, 0.15);
    border-color: #4c8c30; color: #a8cc8c;
}

/* Simple mode: hide advanced elements */
body:not(.advanced) .chroma-wrap,
body:not(.advanced) .level-meter,
body:not(.advanced) .viz-header h3,
body:not(.advanced) #audioDevice,
body:not(.advanced) #timer,
body:not(.advanced) .hero-conf,
body:not(.advanced) .pred-pct,
body:not(.advanced) .history-conf,
body:not(.advanced) .side-col,
body:not(.advanced) #sheetCtxConf {
    display: none !important;
}
body:not(.advanced) .viz-card {
    display: none !important;
}

/* ---- Responsive ---- */
@media (max-width: 900px) {
    .layout { flex-direction: column; }
    .side-col {
        width: 100%; position: static;
        max-height: none; order: -1;
    }
    .preds-card { max-height: 280px; }
    .preds-list {
        max-height: 240px;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0 12px;
    }
    .pred-row { border-left-color: #2a3528; }
}

@media (max-width: 600px) {
    .page { padding: 4px; }
    .layout { width: 100%; }
    .main-col, .side-col { width: 100% !important; min-width: 0; }
    header h1 { font-size: 18px; }
    header p { font-size: 11px; }

    /* Hero card */
    .hero { padding: 10px 8px; margin-bottom: 8px; border-radius: 8px; }
    .hero-name { font-size: 16px; white-space: normal; }
    .hero-top { gap: 8px; }
    .hero-link { font-size: 11px; padding: 5px 10px; align-self: flex-start; }
    .hero-stats { gap: 8px; flex-wrap: wrap; }
    .hero-stat-value { font-size: 14px; }
    .hero-stat-label { font-size: 9px; }

    /* Controls */
    .controls { flex-wrap: wrap; }

    /* Search */
    .search-input { font-size: 16px; padding: 10px 8px; }
    .search-card { margin-bottom: 8px; }

    /* Quick matches */
    .quick-matches { gap: 6px; margin-bottom: 8px; }
    .quick-pill { font-size: 12px; padding: 5px 10px; }

    /* Listen ring */
    .listen-ring-svg { width: 36px; height: 36px; }

    /* Audio visualization */
    .level-meter { margin-bottom: 8px; }
    .viz-card { padding: 6px; margin-bottom: 8px; border-radius: 8px; overflow: hidden; }
    #chromaCanvas { height: 64px; }

    /* Sheet music */
    .sheet-panel-inner { padding: 0 8px; border-radius: 8px; }
    .sheet-panel.open .sheet-panel-inner { padding: 8px; }
    .sheet-render { padding: 6px 4px; border-radius: 6px; overflow-x: auto; }
    .sheet-render-next { padding: 6px 4px; border-radius: 6px; }
    .sheet-header { flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
    .sheet-header h3 { font-size: 10px; }
    .sheet-nav-top { display: none; }
    .sheet-nav-bottom {
        display: flex; justify-content: space-between; align-items: center;
        margin-top: 10px; padding-top: 8px; border-top: 1px solid #2a3528;
    }
    .sheet-nav-btn { width: 32px; height: 32px; font-size: 20px; }
    .sheet-context { font-size: 11px; }
    .sheet-context-name { font-size: 11px; }

    /* Predictions */
    .preds-card { padding: 10px 12px; border-radius: 8px; }
    .preds-card { max-height: none; }
    .preds-list { max-height: 200px; grid-template-columns: 1fr; }
    .pred-row { padding: 6px 8px; }
    .pred-name { font-size: 13px; white-space: normal; }

    /* History */
    .history-card { padding: 10px 8px; margin-bottom: 8px; border-radius: 8px; }

    /* Loading */
    #loadProgress { width: 80%; max-width: 200px; }

    /* Splash */
    #splash .splash-title { font-size: 36px; }
    #splash .splash-fox { font-size: 40px; }
    #splash .splash-btn { font-size: 16px; padding: 10px 28px; }

    /* Layout gap */
    .layout { gap: 8px; }
}
</style>
</head>
<body>
<div id="splash">
    <div class="splash-title">Sionnach</div>
    <div class="splash-fox">&#x1F98A;</div>
    <div class="splash-device">
        <select id="audioInputSelect">
            <option value="">Default Microphone</option>
        </select>
    </div>
    <button class="splash-btn" id="splashStart">Get Started</button>
</div>
<div class="page" id="dashboard" style="display:none">
    <header>
        <h1>Sionnach</h1>
        <p id="tagline" style="opacity:0">Irish Tune Identifier</p>
        <button class="advanced-toggle" id="advancedToggle" title="Toggle detailed view">Details</button>
    </header>

    <div id="loading">
        <p id="loadText">Loading...</p>
        <progress id="loadProgress" max="3" value="0"></progress>
    </div>

    <div id="mainUI" class="hidden">
        <!-- Tune search -->
        <div class="search-card">
            <div class="search-input-wrap">
                <input type="text" id="tuneSearch" class="search-input" placeholder="Search tunes..." autocomplete="off">
                <span class="search-clear hidden" id="searchClear">&times;</span>
            </div>
            <div class="search-results hidden" id="searchResults"></div>
        </div>

        <!-- Audio card -->
        <div class="viz-card">
            <div class="viz-header">
                <h3>Audio</h3>
                <div class="viz-header-right">
                    <span id="audioDevice"></span>
                    <span id="timer">0:00</span>
                </div>
            </div>
            <div class="chroma-wrap">
                <canvas id="chromaCanvas" width="800" height="96"></canvas>
            </div>
            <div class="level-meter">
                <div class="level-meter-fill" id="levelFill"></div>
            </div>
        </div>

        <div class="layout">
            <div class="main-col">
                <!-- Hero: current tune + metrics -->
                <div class="hero">
                    <div class="hero-top">
                        <div class="listen-ring" id="listenRing">
                            <svg class="listen-ring-svg" viewBox="0 0 80 80">
                                <circle class="listen-ring-bg" cx="40" cy="40" r="34" />
                                <circle class="listen-ring-fill" id="listenRingFill" cx="40" cy="40" r="34" />
                            </svg>
                        </div>
                        <div class="hero-info">
                            <div class="hero-label" id="listenRingLabel">Play a tune...</div>
                            <div class="hero-name" id="topTuneName"></div>
                            <div class="hero-meta">
                                <span class="hero-type" id="topTuneType"></span>
                                <span class="hero-conf" id="topTuneConf"></span>
                            </div>
                        </div>
                        <a class="hero-link hidden" id="topTuneLink" href="#" target="_blank">View on The Session</a>
                    </div>
                    <div class="hero-stats">
                        <div class="hero-stat">
                            <span class="hero-stat-label">Key</span>
                            <span class="hero-stat-value" id="metricKey">--</span>
                        </div>
                        <div class="hero-stat">
                            <span class="hero-stat-label">Time Sig</span>
                            <span class="hero-stat-value" id="metricTimeSig">--</span>
                        </div>
                        <div class="hero-stat">
                            <span class="hero-stat-label">Tempo</span>
                            <span class="hero-stat-value" id="metricTempo">--</span>
                            <span class="hero-stat-unit">BPM</span>
                        </div>
                        <button class="mic-btn recording" id="micToggle">Stop</button>
                    </div>
                </div>

                <!-- Quick matches (simple mode) -->
                <div class="quick-matches" id="quickMatches"></div>

                <!-- Sheet music -->
                <div class="sheet-panel" id="sheetPanel">
                    <div class="sheet-panel-inner">
                        <div class="sheet-header">
                            <button class="sheet-lock-icon" id="sheetLockIcon">&#x1F513;</button>
                            <span class="sheet-context" id="sheetContext">
                                <span class="sheet-context-name" id="sheetCtxName"></span>
                                <span class="sheet-context-meta" id="sheetCtxMeta"></span>
                                <svg class="listen-ring-svg sheet-ring" viewBox="0 0 80 80">
                                    <circle class="listen-ring-bg" cx="40" cy="40" r="34" />
                                    <circle class="listen-ring-fill" id="sheetRingFill" cx="40" cy="40" r="34" />
                                </svg>
                                <span class="ctx-conf" id="sheetCtxConf"></span>
                            </span>
                            <div class="sheet-nav sheet-nav-top">
                                <button class="sheet-nav-btn" id="prevSetting">&lsaquo;</button>
                                <span class="sheet-setting-label" id="settingLabel">Setting 1 of 1</span>
                                <button class="sheet-nav-btn" id="nextSetting">&rsaquo;</button>
                            </div>
                        </div>
                        <div class="sheet-stage">
                            <div class="sheet-render" id="sheetRender"></div>
                            <div class="sheet-render-next" id="sheetRenderNext"></div>
                        </div>
                        <div class="sheet-nav sheet-nav-bottom">
                            <button class="sheet-nav-btn" id="prevSettingB">&lsaquo;</button>
                            <span class="sheet-setting-label" id="settingLabelB">Setting 1 of 1</span>
                            <button class="sheet-nav-btn" id="nextSettingB">&rsaquo;</button>
                        </div>
                    </div>
                </div>

                <!-- Session history -->
                <div class="history-card">
                    <h3>Session History</h3>
                    <div class="history-list" id="historyList">
                        <div class="history-empty">Tunes will appear here as they are identified</div>
                    </div>
                </div>
            </div>

            <!-- Sidebar: other matches -->
            <div class="side-col">
                <div class="preds-card">
                    <h3>Matches</h3>
                    <div class="preds-list" id="predictionsList">
                        <div class="empty-state">Predictions will appear after a few seconds of audio</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
<script src="app.js?v=4"></script>
</body>
</html>
